<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Public Examination Result</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

*{box-sizing:border-box;}

html,body{
margin:0;
padding:0;
overflow-x:hidden;
font-family:'Segoe UI',Arial,sans-serif;
background:linear-gradient(to bottom,#eef2f7,#dbe6f6);
}

.container{
width:100%;
max-width:500px;
margin:auto;
padding:15px;
}

/* LOGO */

.logo{text-align:center;margin-bottom:10px;}

.logo img{
width:100%;
max-width:320px;
display:block;
margin:auto;
}

/* WAITING BOX */

.waiting-box{
background:linear-gradient(135deg,#0d5ea6,#1fb5b5);
padding:40px 25px;
border-radius:25px;
box-shadow:0 25px 60px rgba(0,0,0,0.25);
text-align:center;
color:white;
}

.wait-title{
font-size:26px;
font-weight:800;
}

.release-time{
margin-top:8px;
font-size:15px;
}

/* COUNTDOWN */

.countdown{
display:flex;
justify-content:center;
gap:14px;
margin-top:30px;
}

.time-box{
background:rgba(255,255,255,0.15);
width:80px;
padding:18px 10px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.time-num{
font-size:28px;
font-weight:800;
}

.time-label{
font-size:11px;
margin-top:3px;
}

/* SLIDER */

.preview-box{
width:100%;
max-width:200px;
height:260px;
margin:35px auto 0;
border-radius:20px;
overflow:hidden;
background:white;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

.preview-slider{
height:400%;
display:flex;
flex-direction:column;
animation:smoothSlide 16s ease-in-out infinite;
}

.preview-slider img{
width:100%;
height:260px;
object-fit:cover;
}

@keyframes smoothSlide{

0%{transform:translateY(0);}
20%{transform:translateY(0);}

25%{transform:translateY(-260px);}
45%{transform:translateY(-260px);}

50%{transform:translateY(-520px);}
70%{transform:translateY(-520px);}

75%{transform:translateY(-780px);}
95%{transform:translateY(-780px);}

100%{transform:translateY(0);}

}

/* SEARCH */

.search-box{
background:white;
padding:20px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:1px solid #ddd;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:linear-gradient(45deg,#0d5ea6,#1fb5b5);
color:white;
border:none;
border-radius:12px;
font-size:15px;
cursor:pointer;
}

/* RESULT */

.result-card{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.1);
margin-top:15px;
}

.student-box{
background:linear-gradient(45deg,#0d5ea6,#1fb5b5);
padding:15px;
border-radius:15px;
text-align:center;
color:white;
}

.badge{
background:rgba(255,255,255,0.2);
padding:6px;
margin:5px 0;
border-radius:8px;
font-weight:bold;
font-size:13px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
font-size:14px;
}

th,td{
border-bottom:1px solid #ddd;
padding:8px;
text-align:center;
}

th{background:#f1f6ff;}

.total-row{
background:#0d5ea6;
color:white;
font-weight:bold;
}

.final{
padding:12px;
text-align:center;
font-size:18px;
font-weight:bold;
margin-top:15px;
border-radius:12px;
}

.pass{background:#2ecc71;color:white;}
.fail{background:#ff4d6d;color:white;}

.back-btn{background:#444;}

.footer{
text-align:center;
padding:12px;
font-size:13px;
color:#555;
}

.footer strong{color:#0d5ea6;}

.hide{display:none;}

</style>
</head>

<body>

<div class="container">

<div class="logo">
<img src="madrasa-logo.png">
</div>

<div id="waitingBox" class="waiting-box">

<div class="wait-title">
Genaral Examination Result
</div>

<div class="release-time">
Result will be published Tomorrow at 8:00 AM
</div>

<div class="countdown" id="countdown"></div>

<div class="preview-box">
<div class="preview-slider">
<img src="slide1.jpg">
<img src="slide2.jpg">
<img src="slide3.jpg">
<img src="slide4.jpg">
</div>
</div>

</div>

<div id="searchBox" class="search-box hide">

<select id="std">
<option value="">Select Standard</option>
<option value="1">Class 1</option>
<option value="2">Class 2</option>
<option value="3">Class 3</option>
<option value="4">Class 4</option>
<option value="6">Class 6</option>
<option value="8">Class 8</option>
<option value="9">Class 9</option>
<option value="11">Class 11</option>
</select>

<input type="text" id="adm" placeholder="Enter Admission Number">

<button onclick="showResult()">Get Result</button>

</div>

<div id="result"></div>

</div>

<div class="footer">
Developed by <strong>SKSBV TECH ADMIN PALYATHADKA UNIT</strong>
</div>

<script>

/* RESULT TIME */

let releaseTime=new Date();
releaseTime.setDate(releaseTime.getDate()+1);
releaseTime.setHours(8);
releaseTime.setMinutes(0);
releaseTime.setSeconds(0);

/* COUNTDOWN */

function updateTimer(){

let now=new Date();
let diff=releaseTime-now;

if(diff<=0){
document.getElementById("waitingBox").style.display="none";
document.getElementById("searchBox").classList.remove("hide");
return;
}

let h=Math.floor(diff/1000/60/60);
let m=Math.floor(diff/1000/60)%60;
let s=Math.floor(diff/1000)%60;

document.getElementById("countdown").innerHTML=`
<div class="time-box"><div class="time-num">${h}</div><div class="time-label">HRS</div></div>
<div class="time-box"><div class="time-num">${m}</div><div class="time-label">MIN</div></div>
<div class="time-box"><div class="time-num">${s}</div><div class="time-label">SEC</div></div>
`;

}

setInterval(updateTimer,1000);
updateTimer();

/* EXCEL DATA */

let students=[];

fetch("students.xlsx")
.then(res=>res.arrayBuffer())
.then(data=>{

let workbook=XLSX.read(data);

workbook.SheetNames.forEach(sheetName=>{

let sheet=workbook.Sheets[sheetName];
let rows=XLSX.utils.sheet_to_json(sheet);

rows.forEach(r=>{

let subjects=[];

Object.keys(r).forEach(key=>{
if(key.startsWith("sub") && r[key]){
let num=key.replace("sub","");
subjects.push([r[key],Number(r["mark"+num]||0)]);
}
});

students.push({
adm:String(r.adm).trim(),
class:String(r.class).trim(),
name:r.name,
subjects:subjects
});

});

});

});

/* SHOW RESULT */

function showResult(){

let adm=document.getElementById("adm").value.trim();
let std=document.getElementById("std").value;
let box=document.getElementById("result");

let st=students.find(s=>s.adm==adm && s.class==std);

if(!st){
box.innerHTML="<div class='result-card'>Result not found</div>";
return;
}

document.getElementById("searchBox").style.display="none";

let total=0;
let pass=true;
let rows="";

st.subjects.forEach(s=>{
total+=s[1];
if(s[1]<18) pass=false;
rows+=`<tr><td>${s[0]}</td><td>${s[1]} / 50</td></tr>`;
});

let max=st.subjects.length*50;

box.innerHTML=`
<div class="result-card" id="resultCard">

<div class="student-box">
<h3>${st.name}</h3>
<div class="badge">Class : ${st.class} - Tharbiyathul Anam Madrasa Palyathadka</div>
<div class="badge">Admission No : ${st.adm}</div>
</div>

<table>
<tr><th>Subject</th><th>Marks</th></tr>
${rows}
<tr class="total-row"><td>Total / Maximum</td><td>${total} / ${max}</td></tr>
</table>

<div class="final ${pass?'pass':'fail'}">
${pass?'PASS':'FAIL'}
</div>

<button onclick="downloadImage()">Download Result</button>

<button class="back-btn" onclick="location.reload()">
Search Another Result
</button>

</div>
`;

}

/* DOWNLOAD IMAGE */

function downloadImage(){

html2canvas(document.body).then(canvas=>{
let link=document.createElement("a");
link.download="result.png";
link.href=canvas.toDataURL();
link.click();
});

}

</script>

</body>
</html>
